<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Systems | Juhi Electronics</title>
    <style>
        :root {
            --primary-color: #00f2fe;
            --bg-color: #0a0a0a;
            --surface-color: #1a1a1a;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-light); text-align: center; padding: 50px 20px; }
        
        h1 { color: var(--primary-color); margin-bottom: 10px; font-size: 2.5rem;}
        
        /* Back Button */
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 40px;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary-color); color: #000; font-weight: bold; }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-item {
            background-color: var(--surface-color);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .gallery-item h3 { color: var(--primary-color); font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- This button takes them back to the home page -->
    <a href="index.html" class="back-btn">← Back to Home</a>

    <h1>Audio Systems Gallery</h1>
    <p style="color: var(--text-muted); margin-bottom: 40px;">Explore our premium setups, components, and heavy bass speakers.</p>

    <!-- The Photo Gallery -->
    <div class="gallery">
        
        <div class="gallery-item">
            <img src="WhatsApp Image 2026-06-26 at 11.28.32.jpeg
" alt="Transisters">
            <h3>Transisters</h3>
        </div>

    </div>

</body>
</html>
